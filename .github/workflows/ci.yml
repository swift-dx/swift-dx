name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SWIFTDX_INTEGRITY: "1"

jobs:
  linux:
    name: Linux / swift:6.3
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v5
      - name: Show toolchain
        run: swift --version
      - name: Build main package
        run: swift build
      - name: Test main package
        run: swift test --enable-code-coverage
      - name: Build Examples
        run: swift build --package-path Examples
      - name: Build Benchmarks (release)
        run: swift build --package-path Benchmarks -c release
