name: swift-dx

services:

  nats1:
    image: nats:2.10-alpine
    container_name: swift-dx-nats1
    profiles: ["nats", "all"]
    command: ["-c", "/etc/nats/nats1.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats/nats1.conf:/etc/nats/nats1.conf:ro
      - nats1-data:/data
    networks:
      - swift-dx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats2:
    image: nats:2.10-alpine
    container_name: swift-dx-nats2
    profiles: ["nats", "all"]
    command: ["-c", "/etc/nats/nats2.conf"]
    ports:
      - "4223:4222"
      - "8223:8222"
    volumes:
      - ./nats/nats2.conf:/etc/nats/nats2.conf:ro
      - nats2-data:/data
    networks:
      - swift-dx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats3:
    image: nats:2.10-alpine
    container_name: swift-dx-nats3
    profiles: ["nats", "all"]
    command: ["-c", "/etc/nats/nats3.conf"]
    ports:
      - "4224:4222"
      - "8224:8222"
    volumes:
      - ./nats/nats3.conf:/etc/nats/nats3.conf:ro
      - nats3-data:/data
    networks:
      - swift-dx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  swift-dx:
    name: swift-dx
    driver: bridge

volumes:
  nats1-data:
  nats2-data:
  nats3-data:
